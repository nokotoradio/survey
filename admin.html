<head>

</head>

<body>

    <script src="script.js">
        window.onload = function () {
            let storedResults = localStorage.getItem("surveyResults");
            if (storedResults) {
                let results = JSON.parse(storedResults);
                console.log("管理者ページで取得:", results);
                updateAdminPanel(results);
            } else {

            }
        };

    </script>
